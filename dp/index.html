<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>DP</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

  <h1>Dynamic Programming</h1>

  <!-- Dashboard -->
  <div class="dashboard">
    <div class="card">
      <span>Total</span>
      <strong id="total">0</strong>
    </div>
    <div class="card">
      <span>Done</span>
      <strong id="done">0</strong>
    </div>
    <div class="card">
      <span>Progress</span>
      <strong id="percent">0%</strong>
    </div>
  </div>

  <div class="progress-bar">
    <div id="progressFill"></div>
  </div>

  <div id="app"></div>

</div>

<script src="script.js"></script>
</body>
</html>
